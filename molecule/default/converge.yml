---

- name: Converge
  hosts: all
  become: "yes"
  vars:
    molecule_driver: "{{ lookup('env', 'MOLECULE_DRIVER_NAME') }}"
    molecule_python_install: True
  roles:
    - deitkrachten.python
  tasks:
    - name: Include role 'ansible-role-molecule'
      ansible.builtin.include_role:
        name: ansible-role-molecule
